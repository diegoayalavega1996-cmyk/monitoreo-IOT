<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Monitoreo Vibracional FCC-RG1</title>
  <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
  <style>
    * {
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: linear-gradient(180deg, #02122f, #051c48);
      display: flex;
      justify-content: center;
      align-items: center;
      color: white;
      padding: 20px;
    }

    .card {
      width: 100%;
      max-width: 700px;
      background: #1d2b45;
      border-radius: 28px;
      padding: 36px 30px;
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.35);
      text-align: center;
    }

    h1 {
      margin: 0 0 8px 0;
      color: #2fb3ff;
      font-size: 34px;
      font-weight: 700;
    }

    .subtitle {
      margin: 0 0 28px 0;
      font-size: 18px;
      color: #e8edf7;
    }

    .menu-buttons {
      display: flex;
      flex-direction: column;
      gap: 16px;
      margin-top: 10px;
    }

    .pump-btn,
    .back-btn {
      border: none;
      border-radius: 20px;
      padding: 20px;
      font-size: 18px;
      cursor: pointer;
      transition: transform 0.15s ease, opacity 0.15s ease;
    }

    .pump-btn {
      background: #2f66e2;
      color: white;
    }

    .pump-btn:hover,
    .back-btn:hover {
      transform: scale(1.01);
      opacity: 0.95;
    }

    .back-btn {
      background: #4b5d80;
      color: white;
      margin-top: 28px;
      width: 220px;
    }

    .hidden {
      display: none;
    }

    .pump-title {
      color: #2fb3ff;
      font-size: 30px;
      margin-bottom: 10px;
    }

    .status-box {
      margin-top: 22px;
      background: #122038;
      border-radius: 20px;
      padding: 28px 20px;
    }

    .value {
      font-size: 54px;
      font-weight: 700;
      margin: 10px 0;
      color: #33d17a;
    }

    .status {
      font-size: 24px;
      font-weight: 700;
      margin-top: 12px;
    }

    .status.normal {
      color: #33d17a;
    }

    .status.alerta {
      color: #ffb020;
    }

    .status.critico {
      color: #ff5c5c;
    }

    .status.sin-datos,
    .status.sin-conexion {
      color: #c9d1e4;
    }

    .small-text {
      margin-top: 10px;
      font-size: 16px;
      color: #d9e2f2;
    }

    @media (max-width: 600px) {
      .card {
        padding: 28px 20px;
      }

      h1 {
        font-size: 28px;
      }

      .pump-title {
        font-size: 26px;
      }

      .value {
        font-size: 42px;
      }
    }
  </style>
</head>
<body>

  <div class="card">
    <!-- PANTALLA PRINCIPAL -->
    <div id="homeScreen">
      <h1>Monitoreo Vibracional Unidad FCC-RG1</h1>
      <p class="subtitle">Seleccione una bomba</p>

      <div class="menu-buttons">
        <button class="pump-btn" onclick="showPump('RG1-P101A')">Bomba RG1-P101A</button>
        <button class="pump-btn" onclick="showPump('RG1-P101B')">Bomba RG1-P101B</button>
        <button class="pump-btn" onclick="showPump('RG1-P009A')">Bomba RG1-P009A</button>
      </div>
    </div>

    <!-- PANTALLA DE BOMBA -->
    <div id="pumpScreen" class="hidden">
      <h1 class="pump-title" id="pumpTitle">Bomba</h1>

      <div class="status-box">
        <div id="pumpValue" class="value">--</div>
        <div id="pumpStatus" class="status sin-datos">Esperando datos</div>
        <div id="pumpExtra" class="small-text"></div>
      </div>

      <button class="back-btn" onclick="goHome()">Regresar</button>
    </div>
  </div>

  <script>
    const topicDatos = 'fcc/rg1/rg1-p101b/datos';

    let currentPump = null;
    let ultimoMensajeMs = 0;

    const client = mqtt.connect(
      'wss://ad668db780cc40d0b2964d742cf80395.s1.eu.hivemq.cloud:8884/mqtt',
      {
        username: 'diego',
        password: 'Tecsup2412'
      }
    );

    client.on('connect', function () {
      console.log('Conectado a HiveMQ');
      client.subscribe(topicDatos);
    });

    client.on('message', function (topic, message) {
      if (topic !== topicDatos) return;

      ultimoMensajeMs = Date.now();

      let data;
      try {
        data = JSON.parse(message.toString());
      } catch (e) {
        console.log('Error leyendo JSON');
        return;
      }

      if (currentPump !== 'RG1-P101B') return;

      actualizarPantallaBombaActiva(data);
    });

    function showPump(pumpName) {
      currentPump = pumpName;

      document.getElementById('homeScreen').classList.add('hidden');
      document.getElementById('pumpScreen').classList.remove('hidden');
      document.getElementById('pumpTitle').textContent = 'Bomba ' + pumpName;

      const valueEl = document.getElementById('pumpValue');
      const statusEl = document.getElementById('pumpStatus');
      const extraEl = document.getElementById('pumpExtra');

      valueEl.className = 'value';
      statusEl.className = 'status';

      if (pumpName === 'RG1-P101A' || pumpName === 'RG1-P009A') {
        valueEl.textContent = '--';
        statusEl.textContent = 'SIN CONEXIÓN';
        statusEl.classList.add('sin-conexion');
        extraEl.textContent = 'Esta bomba no cuenta con sensor instalado.';
        return;
      }

      valueEl.textContent = '--';
      statusEl.textContent = 'Esperando datos';
      statusEl.classList.add('sin-datos');
      extraEl.textContent = 'Conectado al broker MQTT, esperando lectura.';
    }

    function goHome() {
      currentPump = null;
      document.getElementById('pumpScreen').classList.add('hidden');
      document.getElementById('homeScreen').classList.remove('hidden');
    }

    function actualizarPantallaBombaActiva(data) {
      const valueEl = document.getElementById('pumpValue');
      const statusEl = document.getElementById('pumpStatus');
      const extraEl = document.getElementById('pumpExtra');

      if (data.estado === 'SIN_DATOS') {
        valueEl.textContent = '--';
        valueEl.className = 'value';
        statusEl.textContent = 'SIN DATOS';
        statusEl.className = 'status sin-datos';
        extraEl.textContent = 'No se están recibiendo datos del ESP32 sensor.';
        return;
      }

      const vibracion = Number(data.vibracion ?? 0);
      const contador = data.contador ?? '--';

      valueEl.textContent = vibracion.toFixed(1) + ' mm/s';
      statusEl.className = 'status';

      if (vibracion < 4) {
        valueEl.style.color = '#33d17a';
        statusEl.textContent = 'NORMAL';
        statusEl.classList.add('normal');
      } else if (vibracion < 7) {
        valueEl.style.color = '#ffb020';
        statusEl.textContent = 'ALERTA';
        statusEl.classList.add('alerta');
      } else {
        valueEl.style.color = '#ff5c5c';
        statusEl.textContent = 'CRÍTICO';
        statusEl.classList.add('critico');
      }

      extraEl.textContent = 'Último paquete recibido: ' + contador;
    }

    // Si pasan varios segundos sin mensajes nuevos, marcar SIN DATOS en la bomba activa
    setInterval(() => {
      if (currentPump !== 'RG1-P101B') return;

      const ahora = Date.now();

      if (ultimoMensajeMs !== 0 && (ahora - ultimoMensajeMs > 8000)) {
        const valueEl = document.getElementById('pumpValue');
        const statusEl = document.getElementById('pumpStatus');
        const extraEl = document.getElementById('pumpExtra');

        valueEl.textContent = '--';
        valueEl.style.color = '#c9d1e4';
        statusEl.textContent = 'SIN DATOS';
        statusEl.className = 'status sin-datos';
        extraEl.textContent = 'Se perdió la comunicación con el sensor.';
      }
    }, 1000);
  </script>

</body>
</html>
